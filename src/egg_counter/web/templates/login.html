<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} Login</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", sans-serif;
            background: #f4efe5;
            color: #1f2933;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top, #fff8e8, transparent 40%),
                linear-gradient(180deg, #f8f5ee 0%, #ece3d2 100%);
        }
        .card {
            width: min(92vw, 420px);
            padding: 2rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 18px 45px rgba(84, 63, 28, 0.16);
        }
        h1 {
            margin: 0 0 0.5rem;
            font-size: 1.75rem;
        }
        p {
            margin: 0 0 1.5rem;
            color: #52606d;
        }
        label {
            display: block;
            margin: 0 0 0.4rem;
            font-weight: 600;
        }
        input {
            width: 100%;
            margin: 0 0 1rem;
            padding: 0.85rem 1rem;
            border: 1px solid #d9c8a9;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 0;
            border-radius: 999px;
            background: #8a5a14;
            color: #fffdf8;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .error {
            margin-bottom: 1rem;
            padding: 0.85rem 1rem;
            border-radius: 12px;
            background: #fde8e8;
            color: #9b1c1c;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>{{ title }}</h1>
        <p>Log in to access the remote dashboard.</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button type="submit">Log In</button>
        </form>
    </main>
</body>
</html>
